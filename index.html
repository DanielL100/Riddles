<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארכיון החידות</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        
        .subject-section { margin-bottom: 40px; }
        .subject-title { 
            font-size: 1.8rem; 
            color: var(--primary);
            background: #fff;
            padding: 10px 20px;
            border-right: 5px solid var(--accent);
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: block;
            margin-bottom: 25px;
        }
        
        .games-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center; 
            transition: 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #eef0f2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.08); border-color: var(--accent); }

        .media-container {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .thumb { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .thumb:hover { filter: brightness(0.8); }

        .icon-web { font-size: 50px; text-decoration: none; }
        
        .game-name { font-weight: bold; font-size: 1.1rem; margin: 5px 0; color: #333; }
        .file-type { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        
        .action-btn { 
            margin-top: auto; 
            padding: 8px 15px; 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600;
            transition: 0.2s;
        }
        .action-btn:hover { background: #2980b9; }

        /* Modal Pop-up */
        #modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            justify-content: center; align-items: center; flex-direction: column; 
        }
        #modal img { max-width: 90%; max-height: 80%; object-fit: contain; border: 2px solid #444; }
        .close-modal { color: white; font-size: 40px; cursor: pointer; position: absolute; top: 20px; right: 30px; font-weight: bold; }
        .modal-tools { margin-top: 25px; }
        .download-btn { padding: 12px 30px; background: #27ae60; color: white; text-decoration: none; border-radius: 30px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>מאגר החידות והפתרונות</h1>
        <p>בחר נושא לעיון בתכנים</p>
    </header>
    <div id="main-content"></div>
</div>

<div id="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="">
    <div class="modal-tools">
        <a id="download-link" href="" download class="download-btn">⬇️ הורד קובץ</a>
    </div>
</div>

<script>
    const jsonUrl = "./riddles.json";

    async function renderApp() {
        const container = document.getElementById('main-content');
        try {
            const response = await fetch(jsonUrl);
            const data = await response.json();

            for (const [subjectName, games] of Object.entries(data)) {
                const section = document.createElement('section');
                section.className = 'subject-section';
                section.innerHTML = `<h2 class="subject-title">${subjectName}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'games-grid';

                for (const [gameId, info] of Object.entries(games)) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // בניית הנתיב לפי שם הנושא (התיקייה) ישירות מה-JSON
                    const filePath = `./${subjectName}/${gameId}/${info.ref}`;
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(info.ref);

                    let mediaHTML = "";
                    let actionHTML = "";

                    if (isImage) {
                        mediaHTML = `<div class="media-container"><img src="${filePath}" class="thumb" onclick="openModal('${filePath}')"></div>`;
                        actionHTML = `<a href="javascript:void(0)" onclick="openModal('${filePath}')" class="action-btn">הגדל תמונה</a>`;
                    } else {
                        mediaHTML = `<div class="media-container"><a href="${filePath}" target="_blank" class="icon-web">🌐</a></div>`;
                        actionHTML = `<a href="${filePath}" target="_blank" class="action-btn">פתח אתר</a>`;
                    }

                    if(info.ref.includes("html")) {
                        card.innerHTML = `
                            ${mediaHTML}
                            <span class="game-name">${info.name}</span>
                            ${actionHTML}
                        `;
                    } else {
                        card.innerHTML = `
                            ${mediaHTML}
                            <span class="game-name">${info.name}</span>
                            <span class="file-type">${info.ref}</span>
                            ${actionHTML}
                        `;
                    }
                    grid.appendChild(card);
                }
                section.appendChild(grid);
                container.appendChild(section);
            }
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; color:red; padding:50px;">
                <h3>שגיאה בטעינת הקבצים</h3>
                <p>וודא שקובץ riddles.json קיים ותקין בתיקיית השורש.</p>
            </div>`;
        }
    }

    function openModal(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('download-link').href = src;
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // מניעת גלילה כשהמודאל פתוח
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(e) {
        if (e.target == document.getElementById('modal')) closeModal();
    }

    renderApp();
</script>
</body>
</html>

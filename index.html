<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז המשחקים והחידות</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--primary);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header { text-align: center; margin-bottom: 50px; }
        
        .subject-section {
            margin-bottom: 40px;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .subject-title {
            font-size: 1.8rem;
            border-bottom: 3px solid var(--accent);
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            text-align: center;
        }
        .game-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .game-number {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }
        .game-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent);
        }
        #loader { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>החידות של דניאל</h1>
        <p>בחר נושא ומשחק כדי להתחיל</p>
    </header>

    <div id="loader">טוען את רשימת המשחקים...</div>
    <div id="main-content"></div>
</div>

<script>
    // נתיב לקובץ ה-JSON (נמצא באותה תיקייה של ה-index)
    const jsonUrl = "./riddles.json";

    async function loadGallery() {
        const contentArea = document.getElementById('main-content');
        const loader = document.getElementById('loader');

        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error("לא ניתן לטעון את קובץ ה-JSON");
            const data = await response.json();

            loader.style.display = 'none';

            // מעבר על כל נושא (Subject) ב-JSON
            for (const [subjectName, games] of Object.entries(data)) {
                
                // יצירת סקשן לנושא
                const section = document.createElement('section');
                section.className = 'subject-section';
                
                const title = document.createElement('h2');
                title.className = 'subject-title';
                title.innerText = subjectName;
                section.appendChild(title);

                // יצירת הגריד למשחקים
                const grid = document.createElement('div');
                grid.className = 'games-grid';

                // מעבר על המשחקים בתוך הנושא
                for (const [gameId, gameInfo] of Object.entries(games)) {
                    const gameCard = document.createElement('a');
                    
                    // בניית הקישור: Games / שם הנושא / מספר המשחק / index.html
                    gameCard.href = `./Games/${subjectName}/${gameId}/index.html`;
                    gameCard.className = 'game-card';

                    gameCard.innerHTML = `
                        <span class="game-number">משחק ${gameId}</span>
                        <span class="game-name">${gameInfo.name}</span>
                    `;

                    grid.appendChild(gameCard);
                }

                section.appendChild(grid);
                contentArea.appendChild(section);
            }

        } catch (error) {
            console.error(error);
            loader.innerText = "שגיאה בטעינת הנתונים. וודא שקובץ riddles.json קיים ותקין.";
        }
    }

    loadGallery();
</script>

</body>
</html>
